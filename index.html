<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guide des Meilleurs Restaurants</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 40px;
            text-align: center;
        }

        /* --- VUE LISTE --- */
        #restaurant-list {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
        }

        .restaurant-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 340px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .card-img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 24px; }
        .card-content h2 { margin: 0 0 10px 0; color: var(--primary-color); }

        /* --- VUE DÉTAILS --- */
        #details-view {
            display: none;
            background: var(--card-bg);
            width: 100%;
            max-width: 850px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.07);
        }

        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 2px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .back-btn:hover { background: #e2e8f0; }

        /* Grille des plats avec images */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .dish-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #edf2f7;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .dish-img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .dish-info {
            padding: 15px;
        }

        .dish-tag {
            color: var(--accent-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            margin: 0;
        }

        .dish-name {
            font-size: 1.1rem;
            margin: 5px 0;
            color: var(--primary-color);
        }

        .dish-price {
            font-weight: bold;
            color: #2ecc71;
            margin: 0;
        }
    </style>
</head>
<body>

    <h1 id="main-title">Liste des restaurants</h1>

    <div id="restaurant-list"></div>

    <div id="details-view">
        <button class="back-btn" onclick="goBack()">← Retour aux restaurants</button>
        <div id="menu-content"></div>
    </div>

    <script>
        let restaurantsData = []; // Stockera les données du JSON

        // 1. Charger le fichier JSON au démarrage
        fetch('menu.json')
            .then(response => response.json())
            .then(data => {
                restaurantsData = data;
                renderRestaurants(); // Appelle la fonction pour afficher les cartes
            })
            .catch(error => console.error("Erreur de chargement du JSON :", error));

        // 2. Manipulation du DOM pour afficher la liste des restos
        function renderRestaurants() {
            const listContainer = document.getElementById('restaurant-list');
            listContainer.innerHTML = ''; // On vide le conteneur

            restaurantsData.forEach(restaurant => {
                // Création de la carte avec le DOM
                const card = document.createElement('div');
                card.className = 'restaurant-card';
                // Quand on clique, on passe l'ID du resto
                card.onclick = () => showMenu(restaurant.id); 

                // On utilise la première image disponible (l'entrée par exemple) pour la carte
                card.innerHTML = `
                    <img src="${restaurant.menu.plat.image}" class="card-img" alt="${restaurant.name}">
                    <div class="card-content">
                        <h2>${restaurant.name}</h2>
                        <p style="color: #7f8c8d; margin:0;">${restaurant.description}</p>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        // 3. Manipulation du DOM pour afficher le menu d'un restaurant cliqué
        function showMenu(restaurantId) {
            // On trouve le bon restaurant dans nos données
            const restaurant = restaurantsData.find(r => r.id === restaurantId);
            const menuContent = document.getElementById('menu-content');
            
            // Construction dynamique du menu avec images et prix par plat
            menuContent.innerHTML = `
                <h1>${restaurant.name}</h1>
                <p style="color: #7f8c8d; font-size: 1.2rem;">${restaurant.description}</p>
                
                <div class="menu-grid">
                    <div class="dish-card">
                        <img src="${restaurant.menu.entree.image}" class="dish-img" alt="Entrée">
                        <div class="dish-info">
                            <p class="dish-tag">Entrée</p>
                            <p class="dish-name">${restaurant.menu.entree.nom}</p>
                            <p class="dish-price">${restaurant.menu.entree.prix}</p>
                        </div>
                    </div>

                    <div class="dish-card">
                        <img src="${restaurant.menu.plat.image}" class="dish-img" alt="Plat">
                        <div class="dish-info">
                            <p class="dish-tag">Plat</p>
                            <p class="dish-name">${restaurant.menu.plat.nom}</p>
                            <p class="dish-price">${restaurant.menu.plat.prix}</p>
                        </div>
                    </div>

                    <div class="dish-card">
                        <img src="${restaurant.menu.dessert.image}" class="dish-img" alt="Dessert">
                        <div class="dish-info">
                            <p class="dish-tag">Dessert</p>
                            <p class="dish-name">${restaurant.menu.dessert.nom}</p>
                            <p class="dish-price">${restaurant.menu.dessert.prix}</p>
                        </div>
                    </div>
                </div>
            `;

            // On bascule l'affichage
            document.getElementById('restaurant-list').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
        }

        function goBack() {
            document.getElementById('restaurant-list').style.display = 'flex';
            document.getElementById('main-title').style.display = 'block';
            document.getElementById('details-view').style.display = 'none';
        }
    </script>
</body>
</html>
