<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Restaurants Gourmands</title>
    <style>
        /* --- BASE CSS (Le look que tu aimais) --- */
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { color: #2c3e50; border-bottom: 3px solid #e74c3c; padding-bottom: 10px; }

        /* --- VUE LISTE (Les cartes) --- */
        #restaurant-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1000px;
        }

        .restaurant-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
            cursor: pointer; /* Montre que c'est cliquable */
            transition: 0.3s;
            overflow: hidden;
        }

        .restaurant-card:hover { transform: translateY(-10px); }

        .card-img { width: 100%; height: 180px; object-fit: cover; }
        .card-content { padding: 15px; }

        /* --- VUE DÉTAILS (La page menu) --- */
        #details-view {
            display: none; /* Caché par défaut */
            background: white;
            width: 90%;
            max-width: 800px;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .back-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .menu-section {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .menu-category {
            background: #fff5f4;
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid #e74c3c;
        }

        .menu-category h3 { margin-top: 0; color: #e74c3c; }

        .price { font-weight: bold; color: #27ae60; }
    </style>
</head>
<body>

    <h1 id="main-title">🍽️ Liste des restaurants</h1>

    <div id="restaurant-list">
        
        <div class="restaurant-card" onclick="showMenu('bistrot')">
            <img src="https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c?w=500" class="card-img" alt="Bistrot">
            <div class="card-content">
                <h2>Le Bistrot</h2>
                <p>📍 Marseille</p>
                <p>⭐ 4/5</p>
            </div>
        </div>

        <div class="restaurant-card" onclick="showMenu('pizza')">
            <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=500" class="card-img" alt="Pizza">
            <div class="card-content">
                <h2>Pizza Roma</h2>
                <p>📍 Paris</p>
                <p>⭐ 5/5</p>
            </div>
        </div>

    </div>

    <div id="details-view">
        <button class="back-btn" onclick="goBack()">← Retour à la liste</button>
        
        <div id="menu-content">
            </div>
    </div>

    <script>
        // On stocke les données des menus ici
        const data = {
            'bistrot': {
                name: "Le Bistrot",
                description: "Cuisine traditionnelle française faite avec amour.",
                entree: "Soupe à l'oignon gratinée",
                plat: "Coq au vin et sa purée maison",
                dessert: "Crème brûlée à la vanille",
                prix: "32€"
            },
            'pizza': {
                name: "Pizza Roma",
                description: "Les meilleures pizzas au feu de bois de la capitale.",
                entree: "Bruschetta tomate & basilic",
                plat: "Pizza Regina Royale",
                dessert: "Tiramisu traditionnel",
                prix: "24€"
            }
        };

        // Fonction pour afficher le menu
        function showMenu(restaurantKey) {
            const restaurant = data[restaurantKey];
            const menuContent = document.getElementById('menu-content');
            
            // On remplit le HTML des détails
            menuContent.innerHTML = `
                <h1>${restaurant.name}</h1>
                <p><em>${restaurant.description}</em></p>
                <hr>
                <div class="menu-section">
                    <div class="menu-category">
                        <h3>Entrée</h3>
                        <p>${restaurant.entree}</p>
                    </div>
                    <div class="menu-category">
                        <h3>Plat</h3>
                        <p>${restaurant.plat}</p>
                    </div>
                    <div class="menu-category">
                        <h3>Dessert</h3>
                        <p>${restaurant.dessert}</p>
                    </div>
                </div>
                <p style="text-align:right; font-size: 1.5rem;">Menu complet : <span class="price">${restaurant.prix}</span></p>
            `;

            // On cache la liste et on montre les détails
            document.getElementById('restaurant-list').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
        }

        // Fonction pour revenir en arrière
        function goBack() {
            document.getElementById('restaurant-list').style.display = 'flex';
            document.getElementById('main-title').style.display = 'block';
            document.getElementById('details-view').style.display = 'none';
        }
    </script>

</body>
</html>
