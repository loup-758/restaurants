<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guide des Meilleurs Restaurants</title>
    <style>
        /* --- STYLES GÉNÉRAUX & VARIABLES --- */
        :root {
            --primary-color: #2c3e50;
            --accent-color: #e74c3c;
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-muted: #7f8c8d;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 40px;
            text-align: center;
            position: relative;
        }

        h1::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background-color: var(--accent-color);
            margin: 12px auto 0 auto;
            border-radius: 2px;
        }

        /* --- VUE LISTE (Cartes Modernes) --- */
        #restaurant-list {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
        }

        .restaurant-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            width: 340px;
            cursor: pointer;
            transition: transform 0.4s cubic-bezier(0.165, 0.84, 0.44, 1), box-shadow 0.4s ease;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        .card-img-wrapper {
            width: 100%;
            height: 220px;
            overflow: hidden;
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }

        .restaurant-card:hover .card-img {
            transform: scale(1.05);
        }

        .card-content {
            padding: 24px;
        }

        .card-content h2 {
            margin: 0 0 12px 0;
            color: var(--primary-color);
            font-size: 1.5rem;
        }

        .meta-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-top: 15px;
        }

        .stars {
            color: #f1c40f;
            font-weight: bold;
        }

        /* --- VUE DÉTAILS (Page Menu Épurée) --- */
        #details-view {
            display: none;
            background: var(--card-bg);
            width: 100%;
            max-width: 850px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.07);
            border: 1px solid rgba(0,0,0,0.03);
        }

        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 2px solid #e2e8f0;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 30px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            background: #e2e8f0;
            color: var(--primary-color);
            border-color: #e2e8f0;
        }

        .details-header h1 {
            text-align: left;
            margin-bottom: 10px;
            font-size: 2.8rem;
        }
        
        .details-header h1::after {
            display: none;
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .menu-card {
            background: #fdfdfd;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #edf2f7;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            transition: border-color 0.3s ease;
        }

        .menu-card:hover {
            border-color: var(--accent-color);
        }

        .menu-card h3 {
            margin: 0 0 10px 0;
            color: var(--accent-color);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .menu-card p {
            margin: 0;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--primary-color);
        }

        .footer-pricing {
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 15px;
            border-top: 1px solid #edf2f7;
            padding-top: 25px;
            margin-top: 30px;
        }

        .price-label {
            font-size: 1.1rem;
            color: var(--text-muted);
        }

        .price-tag {
            font-size: 2rem;
            font-weight: 700;
            color: #2ecc71;
        }
    </style>
</head>
<body>

    <h1 id="main-title">Liste des restaurants</h1>

    <div id="restaurant-list">
        
        <div class="restaurant-card" onclick="showMenu('bistrot')">
            <div class="card-img-wrapper">
                <img src="https://images.unsplash.com/photo-1550966871-3ed3cdb5ed0c?w=600" class="card-img" alt="Le Bistrot">
            </div>
            <div class="card-content">
                <h2>Le Bistrot</h2>
                <div class="meta-info">
                    <span>📍 Marseille</span>
                    <span class="stars">★ 4/5</span>
                </div>
            </div>
        </div>

        <div class="restaurant-card" onclick="showMenu('pizza')">
            <div class="card-img-wrapper">
                <img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600" class="card-img" alt="Pizza Roma">
            </div>
            <div class="card-content">
                <h2>Pizza Roma</h2>
                <div class="meta-info">
                    <span>📍 Paris</span>
                    <span class="stars">★ 5/5</span>
                </div>
            </div>
        </div>

    </div>

    <div id="details-view">
        <button class="back-btn" onclick="goBack()">← Retour aux restaurants</button>
        <div id="menu-content">
            </div>
    </div>

    <script>
        // Données mises à jour selon tes consignes
        const data = {
            'bistrot': {
                name: "Le Bistrot",
                description: "Cuisine traditionnelle française.",
                entree: "Soupe à l'oignon gratinée",
                plat: "Une excellente raclette traditionnelle",
                dessert: "Crème brûlée à la vanille",
                prix: "32€"
            },
            'pizza': {
                name: "Pizza Roma",
                description: "Les meilleures pizzas au feu de bois de la capitale.",
                entree: "Bruschetta tomate & basilic",
                plat: "Pizza 4 fromages",
                dessert: "Tiramisu traditionnel",
                prix: "24€"
            }
        };

        function showMenu(restaurantKey) {
            const restaurant = data[restaurantKey];
            const menuContent = document.getElementById('menu-content');
            
            menuContent.innerHTML = `
                <div class="details-header">
                    <h1>${restaurant.name}</h1>
                    <p class="description">${restaurant.description}</p>
                </div>
                <div class="menu-grid">
                    <div class="menu-card">
                        <h3>Entrée</h3>
                        <p>${restaurant.entree}</p>
                    </div>
                    <div class="menu-card">
                        <h3>Plat</h3>
                        <p>${restaurant.plat}</p>
                    </div>
                    <div class="menu-card">
                        <h3>Dessert</h3>
                        <p>${restaurant.dessert}</p>
                    </div>
                </div>
                <div class="footer-pricing">
                    <span class="price-label">Formule Menu Complet</span>
                    <span class="price-tag">${restaurant.prix}</span>
                </div>
            `;

            document.getElementById('restaurant-list').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function goBack() {
            document.getElementById('restaurant-list').style.display = 'flex';
            document.getElementById('main-title').style.display = 'block';
            document.getElementById('details-view').style.display = 'none';
        }
    </script>

</body>
</html>
