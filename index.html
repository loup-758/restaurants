<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guide des Meilleurs Restaurants</title>
    <style>
        /* --- MODE SOMBRE ACTIVÉ --- */
        :root {
            --primary-color: #f1f2f6;  /* Titres clairs */
            --accent-color: #e74c3c;   /* Accent rouge conservé */
            --bg-color: #121212;       /* Fond général très sombre */
            --card-bg: #1e1e1e;        /* Fond des cartes gris foncé */
            --text-main: #ffffff;      /* Texte principal blanc */
            --text-muted: #a0aec0;     /* Texte secondaire gris clair */
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            color: var(--primary-color);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-align: center;
        }

        /* --- BARRE DE RECHERCHE --- */
        .search-container {
            width: 100%;
            max-width: 500px;
            margin-bottom: 40px;
        }

        .search-input {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #2d3748;
            background-color: #2d3748;
            color: white;
            border-radius: 30px;
            outline: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 10px 20px rgba(231, 76, 60, 0.2);
        }

        /* --- VUE LISTE --- */
        #restaurant-list {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            max-width: 1100px;
            width: 100%;
        }

        .restaurant-card {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            width: 340px;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(231, 76, 60, 0.15);
        }

        .card-img { width: 100%; height: 220px; object-fit: cover; }
        .card-content { padding: 24px; flex-grow: 1; }
        .card-content h2 { margin: 0 0 10px 0; color: var(--primary-color); }
        .card-content p { color: var(--text-muted); margin: 0; font-size: 0.95rem; }

        /* --- VUE DÉTAILS --- */
        #details-view {
            display: none;
            background: var(--card-bg);
            width: 100%;
            max-width: 850px;
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 15px 45px rgba(0, 0, 0, 0.4);
            box-sizing: border-box;
        }

        .back-btn {
            background: transparent;
            color: var(--text-muted);
            border: 2px solid #2d3748;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .back-btn:hover { background: #2d3748; color: white; }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 25px;
            margin: 40px 0;
        }

        .dish-card {
            background: #2d3748;
            border-radius: 12px;
            border: 1px solid #4a5568;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .dish-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            object-position: center center;
        }

        .dish-info { padding: 15px; }
        .dish-tag { color: var(--accent-color); font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin: 0; }
        .dish-name { font-size: 1.1rem; margin: 5px 0; color: var(--primary-color); min-height: 44px; }
        .dish-price { font-weight: bold; color: #2ecc71; margin: 0; }
    </style>
</head>
<body>

    <h1 id="main-title">Liste des restaurants</h1>

    <div class="search-container" id="search-box">
        <input type="text" id="search-input" class="search-input" placeholder="Rechercher un restaurant, une spécialité..." oninput="filterRestaurants()">
    </div>

    <div id="restaurant-list"></div>

    <div id="details-view">
        <button class="back-btn" onclick="goBack()">← Retour aux restaurants</button>
        <div id="menu-content"></div>
    </div>

    <script>
        let restaurantsData = [];

        fetch('menu.json?t=' + new Date().getTime())
            .then(response => response.json())
            .then(data => {
                restaurantsData = data;
                renderRestaurants(restaurantsData);
            })
            .catch(error => console.error("Erreur de chargement du JSON :", error));

        function renderRestaurants(list) {
            const listContainer = document.getElementById('restaurant-list');
            listContainer.innerHTML = '';

            if (list.length === 0) {
                listContainer.innerHTML = `<p style="color: #7f8c8d; font-size: 1.2rem; margin-top: 20px;">Aucun résultat trouvé... 😕</p>`;
                return;
            }

            list.forEach(restaurant => {
                const card = document.createElement('div');
                card.className = 'restaurant-card';
                
                // Sécurité rajoutée ici : on passe directement tout l'objet restaurant au lieu de l'ID seul
                card.onclick = () => showMenu(restaurant); 

                card.innerHTML = `
                    <img src="${restaurant.menu.plat.image}" class="card-img" alt="${restaurant.name}">
                    <div class="card-content">
                        <h2>${restaurant.name}</h2>
                        <p>${restaurant.description}</p>
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function filterRestaurants() {
            const query = document.getElementById('search-input').value.toLowerCase().trim();
            const filtered = restaurantsData.filter(restaurant => {
                return restaurant.name.toLowerCase().includes(query) || 
                       restaurant.description.toLowerCase().includes(query);
            });
            renderRestaurants(filtered);
        }

        // Modification ici : la fonction prend directement les données du resto, plus de risque d'ID introuvable !
        function showMenu(restaurant) {
            if (!restaurant) return;
            const menuContent = document.getElementById('menu-content');
            
            menuContent.innerHTML = `
                <h1>${restaurant.name}</h1>
                <p style="color: #a0aec0; font-size: 1.2rem;">${restaurant.description}</p>
                
                <div class="menu-grid">
                    <div class="dish-card">
                        <img src="${restaurant.menu.entree.image}" class="dish-img" alt="Entrée">
                        <div class="dish-info">
                            <p class="dish-tag">Entrée</p>
                            <p class="dish-name">${restaurant.menu.entree.nom}</p>
                            <p class="dish-price">${restaurant.menu.entree.prix}</p>
                        </div>
                    </div>

                    <div class="dish-card">
                        <img src="${restaurant.menu.plat.image}" class="dish-img" alt="Plat">
                        <div class="dish-info">
                            <p class="dish-tag">Plat</p>
                            <p class="dish-name">${restaurant.menu.plat.nom}</p>
                            <p class="dish-price">${restaurant.menu.plat.prix}</p>
                        </div>
                    </div>

                    <div class="dish-card">
                        <img src="${restaurant.menu.dessert.image}" class="dish-img" alt="Dessert">
                        <div class="dish-info">
                            <p class="dish-tag">Dessert</p>
                            <p class="dish-name">${restaurant.menu.dessert.nom}</p>
                            <p class="dish-price">${restaurant.menu.dessert.prix}</p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('restaurant-list').style.display = 'none';
            document.getElementById('main-title').style.display = 'none';
            document.getElementById('search-box').style.display = 'none';
            document.getElementById('details-view').style.display = 'block';
            window.scrollTo(0,0);
        }

        function goBack() {
            document.getElementById('restaurant-list').style.display = 'flex';
            document.getElementById('main-title').style.display = 'block';
            document.getElementById('search-box').style.display = 'block';
            document.getElementById('details-view').style.display = 'none';
        }
    </script>
</body>
</html>
